name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: Existing release tag to upload to the Chrome Web Store
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 10.33.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm check

  e2e:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 10.33.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - name: Cache Playwright browsers
        uses: actions/cache@0400d5f644dc74513175e3cd8d07132dd4860809 # v4.2.4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
      - name: Install Chromium
        run: pnpm exec playwright install --with-deps chromium
      - run: pnpm e2e

  build-and-release:
    if: github.event_name == 'push'
    needs: [check, e2e]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 10.33.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: 'pnpm'
      # --ignore-scripts: this job mints the build-provenance attestation, so a
      # compromised build-time dependency must not run install-time code that
      # could tamper with the artifact before it is signed. esbuild resolves its
      # platform binary at runtime, so the build needs no dependency scripts.
      - run: pnpm install --frozen-lockfile --ignore-scripts
      - name: Build release archive
        run: pnpm exec wxt zip
      - name: Enforce release manifest policy
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: node scripts/manifest-policy.mjs --release
      - name: Enforce no-network invariant on the attested artifact
        run: node scripts/check-no-egress.mjs
      - name: Compute checksums
        run: |
          cd .output
          sha256sum *.zip > SHA256SUMS
      - name: Attest build provenance
        id: attest
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: '.output/*.zip'
      - name: Create draft release
        env:
          BUNDLE_PATH: ${{ steps.attest.outputs.bundle-path }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          gh release create "$RELEASE_TAG" \
            --draft \
            --title "$RELEASE_TAG" \
            --notes "Verify the downloaded archive with gh attestation verify <zip> --repo ${{ github.repository }}." \
            .output/*.zip \
            .output/SHA256SUMS \
            "$BUNDLE_PATH"

  publish-cws:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      attestations: read
    env:
      CWS_CLIENT_ID: ${{ secrets.CWS_CLIENT_ID }}
      CWS_CLIENT_SECRET: ${{ secrets.CWS_CLIENT_SECRET }}
      CWS_REFRESH_TOKEN: ${{ secrets.CWS_REFRESH_TOKEN }}
      CWS_EXTENSION_ID: ${{ secrets.CWS_EXTENSION_ID }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      RELEASE_TAG: ${{ inputs.tag }}
    steps:
      - name: Resolve publish configuration
        id: cfg
        run: |
          if [[ -n "$CWS_CLIENT_ID" && -n "$CWS_CLIENT_SECRET" && -n "$CWS_REFRESH_TOKEN" && -n "$CWS_EXTENSION_ID" ]]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "CWS publish secrets are not configured; skipping upload. Configure CWS_CLIENT_ID/CWS_CLIENT_SECRET/CWS_REFRESH_TOKEN/CWS_EXTENSION_ID to enable this step."
          fi
      - name: Checkout
        if: steps.cfg.outputs.configured == 'true'
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        if: steps.cfg.outputs.configured == 'true'
        with:
          version: 10.33.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        if: steps.cfg.outputs.configured == 'true'
        with:
          node-version: 22
      # The upload CLI runs in the one job that holds the long-lived store
      # publish token. Bare `npx --yes` would re-resolve and execute its whole
      # transitive tree fresh from the registry at run time. Instead install
      # from a dedicated lockfile that pins every transitive package by integrity
      # hash, with --ignore-scripts so no install-time code runs near the token.
      - name: Install pinned Chrome Web Store upload CLI
        if: steps.cfg.outputs.configured == 'true'
        run: pnpm --dir .github/publish install --frozen-lockfile --ignore-scripts
      # Uploads a draft version only; publishing remains a manual CWS dashboard action.
      - name: Verify provenance and upload to the Chrome Web Store
        if: steps.cfg.outputs.configured == 'true'
        run: |
          mkdir release-assets
          gh release download "$RELEASE_TAG" --pattern '*.zip' --dir release-assets
          zip_paths=(release-assets/*.zip)
          if [[ ${#zip_paths[@]} -ne 1 || ! -f "${zip_paths[0]}" ]]; then
            echo "Expected exactly one zip release asset." >&2
            exit 1
          fi
          zip="${zip_paths[0]}"
          # Fail closed unless the downloaded zip matches a build-provenance
          # attestation minted by THIS repo's release workflow. Binding to
          # --repo and --signer-workflow (not just --owner) rejects an older
          # HeaderShim build or any artifact from another repo the owner
          # controls. The draft release asset is mutable between build and this
          # manual publish; this blocks a swapped or tampered artifact.
          gh attestation verify "$zip" \
            --repo "${{ github.repository }}" \
            --signer-workflow "${{ github.repository }}/.github/workflows/release.yml"
          .github/publish/node_modules/.bin/chrome-webstore-upload upload \
            --source "$zip" \
            --extension-id "$CWS_EXTENSION_ID" \
            --client-id "$CWS_CLIENT_ID" \
            --client-secret "$CWS_CLIENT_SECRET" \
            --refresh-token "$CWS_REFRESH_TOKEN"
